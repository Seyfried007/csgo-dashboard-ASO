<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS:GO Server Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="antialiased font-sans overflow-x-hidden selection:bg-cyan-500 selection:text-white">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:justify-between md:items-center gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Counter-Strike_Global_Offensive.svg/512px-Counter-Strike_Global_Offensive.svg.png"
                    alt="CS:GO Logo" class="w-16 h-16 object-contain opacity-90 drop-shadow-lg">
                <div>
                    <h1
                        class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                        CS:GO Server Monitor</h1>
                    <p class="text-gray-300 flex items-center gap-2 mt-1">
                        45.235.98.242:27035
                        <span class="inline-block w-2.5 h-2.5 bg-green-400 rounded-full pulse ml-2"
                            id="statusDot"></span>
                        <span class="text-xs text-green-400 font-semibold uppercase tracking-wider"
                            id="statusText">Conectando...</span>
                    </p>
                </div>
            </div>

            <div class="glass-card px-6 py-3 rounded-xl flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-gray-400 uppercase tracking-widest">Próxima Act.</p>
                    <p class="text-sm font-medium" id="countdownTimer">60s</p>
                </div>
                <button onclick="forceUpdate()"
                    class="bg-cyan-600 hover:bg-cyan-500 text-white p-3 rounded-lg transition-colors focus:ring-2 focus:ring-cyan-300 outline-none">
                    <i class="fa-solid fa-rotate-right" id="refreshIcon"></i>
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <!-- Players Card -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div
                    class="absolute -right-6 -top-6 text-white/5 text-8xl group-hover:text-white/10 transition-colors pointer-events-none">
                    <i class="fa-solid fa-users"></i>
                </div>
                <h3 class="text-sm text-gray-400 uppercase font-semibold tracking-wider mb-2">Jugadores</h3>
                <div class="flex items-end gap-2">
                    <span class="text-5xl font-bold text-white" id="valPlayers">--</span>
                    <span class="text-xl text-gray-400 mb-1">/ <span id="valMaxPlayers">--</span></span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-1.5 mt-4 overflow-hidden">
                    <div class="bg-gradient-to-r from-cyan-400 to-blue-500 h-1.5 rounded-full transition-all duration-1000"
                        id="playersBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Peak Card -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div
                    class="absolute -right-6 -top-6 text-white/5 text-8xl group-hover:text-white/10 transition-colors pointer-events-none">
                    <i class="fa-solid fa-fire-flame-curved"></i>
                </div>
                <h3 class="text-sm text-gray-400 uppercase font-semibold tracking-wider mb-2">Pico de Sesión</h3>
                <div class="flex gap-2 flex-col">
                    <span class="text-5xl font-bold text-orange-400" id="valPeak">--</span>
                    <span class="text-sm text-gray-400 mt-1">Jugadores máximos detectados</span>
                </div>
            </div>

            <!-- Map Card -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div
                    class="absolute -right-6 -top-6 text-white/5 text-8xl group-hover:text-white/10 transition-colors pointer-events-none">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h3 class="text-sm text-gray-400 uppercase font-semibold tracking-wider mb-2">Mapa Actual</h3>
                <div class="flex flex-col gap-1">
                    <span class="text-3xl font-bold text-white truncate" id="valMap"
                        title="Cargando...">Cargando...</span>
                    <!-- Map Image Container -->
                    <div
                        class="mt-3 relative w-full h-16 rounded-lg overflow-hidden border border-white/10 bg-gray-800">
                        <img id="mapImage" src="" alt="Map" class="w-full h-full object-cover opacity-60 hidden">
                        <div id="mapPlaceholder"
                            class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm">
                            <i class="fa-regular fa-image mr-2"></i> Sin vista previa
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section (Top Row) -->
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
            
            <!-- Resumen Histórico en Tabla -->
            <div class="glass-card rounded-2xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-cyan-400"></i>
                        Registro Diario
                    </h3>
                </div>
                <div class="overflow-hidden rounded-xl border border-white/10 bg-gray-800/50 flex-grow relative">
                    <div class="overflow-y-auto absolute inset-0 custom-scrollbar">
                        <table class="w-full text-left text-sm text-gray-300">
                            <thead class="text-xs text-gray-400 uppercase bg-gray-900/50 sticky top-0 z-10 backdrop-blur-md">
                                <tr>
                                    <th scope="col" class="px-6 py-4 font-semibold">Fecha</th>
                                    <th scope="col" class="px-6 py-4 font-semibold text-center">Pico de Jugadores</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody" class="divide-y divide-white/5">
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="px-6 py-4 text-center text-gray-500 italic" colspan="2">Cargando datos...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Gráfico Actividad Semanal/Diaria -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-calendar-week text-emerald-400"></i>
                        Historial (Días)
                    </h3>
                    <button onclick="clearHistory('daily')" class="text-xs text-gray-500 hover:text-red-400 transition-colors" title="Limpiar datos">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="relative h-64 w-full">
                    <canvas id="daysChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Charts Section (Bottom Row) -->
        <div class="grid grid-cols-1 gap-6 mb-10">
            <!-- Gráfico Actividad por Horas -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-clock text-purple-400"></i>
                        Historial Hoy (24 Horas)
                    </h3>
                    <button onclick="clearHistory('hourly')" class="text-xs text-gray-500 hover:text-red-400 transition-colors" title="Limpiar datos">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="relative h-72 w-full">
                    <canvas id="hoursChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>

</html>
